<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Orange Games - Retro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --orange: #FF8200;
    --border-thick: 4px solid #ffffff;
    --border-orange: 4px solid #FF8200;
  }
  
  body {
    margin: 0;
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Pixelify Sans', monospace;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  
  /* Multi-page layout system */
 .page {
    display: none;
    width: 100%;
    max-width: 800px;
    padding: 20px;
    box-sizing: border-box;
  }
  
 .page.active {
    display: block;
    animation: fadeIn 0.3s;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  /* Retro Dialog Boxes */
 .box {
    border: var(--border-thick);
    padding: 24px;
    background: #000;
    margin-bottom: 20px;
  }
  
  h1, h2, h3 {
    margin-top: 0;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  h1 { 
    color: var(--orange); 
    font-size: 54px; 
    text-align: center; 
    text-shadow: 2px 2px 0px #fff;
  }
  
  p { font-size: 26px; line-height: 1.5; margin: 10px 0; }
  
  /* Retro Buttons */
 .btn {
    background: #000;
    color: var(--text);
    border: var(--border-thick);
    font-family: 'Pixelify Sans', monospace;
    font-size: 24px;
    padding: 12px 24px;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.1s;
    margin-right: 15px;
    margin-bottom: 15px;
  }
  
 .btn:hover {
    border: var(--border-orange);
    color: var(--orange);
  }
  
 .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }
  
  /* Typewriter Cursor Animation */
 .cursor {
    display: inline-block;
    width: 14px;
    height: 26px;
    background-color: var(--orange);
    animation: blink 1s step-end infinite;
    vertical-align: bottom;
    margin-left: 4px;
  }
  
  @keyframes blink {
    50% { opacity: 0; }
  }
  
  /* Form Elements */
 .form-group { margin-bottom: 24px; }
 .form-group input {
    width: 100%;
    background: #000;
    border: var(--border-thick);
    color: var(--text);
    font-family: 'Pixelify Sans', monospace;
    font-size: 24px;
    padding: 14px;
    box-sizing: border-box;
    margin-top: 10px;
  }
  
 .form-group input:focus {
    outline: none;
    border: var(--border-orange);
  }
  
 .asterisk { color: var(--orange); margin-right: 10px; font-weight: bold; }
</style>
</head>
<body>

  <div id="loadingPage" class="page active box">
    <p><span class="asterisk">*</span> <span id="loadingText"></span><span class="cursor"></span></p>
  </div>

  <div id="homePage" class="page">
    <h1>Orange Games</h1>
    <div class="box">
      <p><span class="asterisk">*</span> Welcome to the underground hub of retro gaming.</p>
      <p><span class="asterisk">*</span> What will you do?</p>
      <div style="margin-top: 20px;">
        <button class="btn" onclick="nav('gamesPage')">Play Games</button>
        <button class="btn" onclick="nav('registerPage')">Save Soul (Register)</button>
      </div>
    </div>
  </div>

  <div id="gamesPage" class="page">
    <h1>Select Game</h1>
    <div class="grid">
      <div class="box">
        <h2>Tic-Tac-Toe</h2>
        <p>Classic 3x3 logic. Will you show mercy or dominate?</p>
        <button class="btn" onclick="typeDialog('You selected Tic-Tac-Toe. Knowing your opponent fills you with DETERMINATION.')">FIGHT</button>
      </div>
      <div class="box">
        <h2>AU Clicker</h2>
        <p>Gain AU. Upgrade stats. Become unstoppable.</p>
        <button class="btn" onclick="typeDialog('You selected AU Clicker. Your fingers twitch with anticipation.')">FIGHT</button>
      </div>
    </div>
    
    <div style="margin-top: 20px;">
      <button class="btn" onclick="nav('homePage')">FLEE (Back)</button>
    </div>
    
    <div id="dialogBox" class="box" style="display:none; margin-top:24px;">
      <p><span class="asterisk">*</span> <span id="dialogText"></span><span class="cursor"></span></p>
    </div>
  </div>

  <div id="registerPage" class="page">
    <h1>Create Save File</h1>
    <div class="box">
      <div class="form-group">
        <label><span class="asterisk">*</span> Enter your electronic mail address:</label>
        <input type="email" id="emailInput" placeholder="player@orange.games">
      </div>
      <button class="btn" onclick="submitReg()">SAVE</button>
      <button class="btn" onclick="nav('homePage')">CANCEL</button>
    </div>
  </div>

  <script>
    // Page Navigation Logic
    function nav(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      document.getElementById('dialogBox').style.display = 'none'; // Reset dialog
    }

    // Classic RPG Typewriter Text Engine
    function typeWriter(text, elementId, speed, callback) {
      const el = document.getElementById(elementId);
      el.innerHTML = '';
      let i = 0;
      
      function type() {
        if (i < text.length) {
          el.innerHTML += text.charAt(i);
          i++;
          setTimeout(type, speed);
        } else if (callback) {
          setTimeout(callback, 500);
        }
      }
      type();
    }

    // Trigger Game Dialogues
    function typeDialog(text) {
      const dialog = document.getElementById('dialogBox');
      dialog.style.display = 'block';
      typeWriter(text, 'dialogText', 40);
    }

    // Registration Form Submission
    function submitReg() {
      const email = document.getElementById('emailInput').value;
      if(email) {
        alert('* SAVE POINT CREATED.\nAccount registered: ' + email);
        document.getElementById('emailInput').value = '';
        nav('homePage');
      } else {
        alert('* You cannot save an empty soul. Please enter an email.');
      }
    }

    // Initial Boot Sequence Animation
    window.onload = () => {
      typeWriter("Booting up Orange Games module...", "loadingText", 60, () => {
        nav('homePage');
      });
    };
  </script>
</body>
</html>
